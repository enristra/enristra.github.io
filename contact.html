<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Enrico Strangio</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">

        <main>
            <section>
                <h1 class="title">Contact</h1>
                <p>Have a question, an idea, or just want to say hi? Fill in the form below and I'll get back to you.
                </p>
            </section>

            <section>

                <form id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <input class="text-field" id="first_name" name="first_name" type="text"
                                placeholder="First Name *" required maxlength="40">
                        </div>
                        <div class="form-group">
                            <input class="text-field" id="last_name" name="last_name" type="text"
                                placeholder="Last Name *" required maxlength="40">
                        </div>
                    </div>

                    <div class="form-group">
                        <input class="text-field" id="email" name="email" type="email" placeholder="Email *" required
                            maxlength="80">
                    </div>

                    <div class="form-group">
                        <textarea class="text-field" id="message" name="message" placeholder="Message *" required
                            rows="5" style="resize: vertical;"></textarea>
                    </div>

                    <button type="submit" class="button">Send Message</button>
                    <p class="form-status" id="form-status"></p>
                </form>
            </section>
        </main>
    </div>
    <script src="index.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            const data = new FormData(form);

            try {
                
                const response = await fetch('https://formspree.io/f/xvzvgook', {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    status.textContent = 'Message sent. I\'ll get back to you soon.';
                    status.style.display = 'block';
                    form.reset();
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                status.textContent = 'Something went wrong. Try emailing me directly at enri99.es@gmail.com';
                status.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Send Message';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
